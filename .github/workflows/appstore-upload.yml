name: App Store Upload

on:
  push:
    tags:
      - "appstore-upload-*"
      - "appstore-submit-*"
  workflow_dispatch:
    inputs:
      upload_metadata:
        description: "Upload App Store metadata, screenshots, and app icon"
        type: boolean
        default: true
      upload_build:
        description: "Build signed IPA and upload to App Store Connect/TestFlight"
        type: boolean
        default: true
      submit_for_review:
        description: "Submit for App Review after owner confirmations are set"
        type: boolean
        default: false
      app_version:
        description: "App Store version to create/update"
        type: string
        default: "1.0.1"
      upload_screenshots:
        description: "Upload screenshots when uploading App Store metadata"
        type: boolean
        default: true
      app_build_number:
        description: "Existing App Store Connect build number to submit when skipping build upload"
        type: string
        default: ""

jobs:
  appstore:
    name: App Store Connect Upload
    runs-on: macos-26
    timeout-minutes: 60
    env:
      APP_IDENTIFIER: ${{ vars.APP_IDENTIFIER || 'com.fleetscanai.app' }}
      APP_VERSION: ${{ inputs.app_version || '1.0.1' }}
      APP_NAME: ${{ vars.APP_NAME || 'FleetScan AI' }}
      APP_SUBTITLE: ${{ vars.APP_SUBTITLE || 'AI vehicle checks for fleets' }}
      APP_SUPPORT_URL: ${{ vars.APP_SUPPORT_URL || secrets.APP_SUPPORT_URL || 'https://github.com/lanray07/FleetScan-AI/issues' }}
      APP_MARKETING_URL: ${{ vars.APP_MARKETING_URL || secrets.APP_MARKETING_URL || 'https://github.com/lanray07/FleetScan-AI' }}
      APP_PRIVACY_URL: ${{ vars.APP_PRIVACY_URL || secrets.APP_PRIVACY_URL || 'https://github.com/lanray07/FleetScan-AI/blob/main/PRIVACY.md' }}
      APP_COPYRIGHT: ${{ vars.APP_COPYRIGHT || secrets.APP_COPYRIGHT || '2026 Olanrewaju Bankole' }}
      APP_BUILD_NUMBER: ${{ inputs.app_build_number || vars.APP_BUILD_NUMBER || '' }}
      SKIP_SCREENSHOTS: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_screenshots == false }}
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
      APP_STORE_CONNECT_API_KEY_P8_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8_BASE64 }}
      APPLE_DISTRIBUTION_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE_P12_BASE64 }}
      APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      CONFIRM_SUBMIT_FOR_REVIEW: ${{ secrets.CONFIRM_SUBMIT_FOR_REVIEW }}
      OWNER_CONFIRMED_PRIVACY: ${{ secrets.OWNER_CONFIRMED_PRIVACY }}
      OWNER_CONFIRMED_DSA: ${{ secrets.OWNER_CONFIRMED_DSA }}
      OWNER_CONFIRMED_EXPORT: ${{ secrets.OWNER_CONFIRMED_EXPORT }}
      OWNER_CONFIRMED_CONTENT_RIGHTS: ${{ secrets.OWNER_CONFIRMED_CONTENT_RIGHTS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_PATH="/Applications/Xcode.app"
          if [ ! -d "$XCODE_PATH" ]; then
            XCODE_PATH="$(ls -d /Applications/Xcode_26*.app 2>/dev/null | grep -vi beta | sort | tail -n 1 || true)"
          fi
          if [ -z "$XCODE_PATH" ]; then
            echo "No Xcode 26 installation found"
            exit 1
          fi
          sudo xcode-select -s "$XCODE_PATH"
          xcodebuild -version
          SDK_VERSION="$(xcrun --sdk iphoneos --show-sdk-version)"
          echo "Using iPhoneOS SDK $SDK_VERSION"
          case "$SDK_VERSION" in
            26.*|[3-9][0-9].*) ;;
            *) echo "iPhoneOS SDK 26 or later is required for App Store upload" && exit 1 ;;
          esac
          echo "DEVELOPER_DIR=$XCODE_PATH/Contents/Developer" >> "$GITHUB_ENV"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Validate required secrets
        run: |
          test -n "$APP_STORE_CONNECT_API_KEY_ID" || (echo "Missing APP_STORE_CONNECT_API_KEY_ID" && exit 1)
          test -n "$APP_STORE_CONNECT_ISSUER_ID" || (echo "Missing APP_STORE_CONNECT_ISSUER_ID" && exit 1)
          test -n "$APP_STORE_CONNECT_API_KEY_P8$APP_STORE_CONNECT_API_KEY_P8_BASE64" || (echo "Missing APP_STORE_CONNECT_API_KEY_P8 or APP_STORE_CONNECT_API_KEY_P8_BASE64" && exit 1)
          test -n "$APPLE_TEAM_ID" || (echo "Missing APPLE_TEAM_ID" && exit 1)
          test -n "$APP_SUPPORT_URL" || (echo "Missing APP_SUPPORT_URL" && exit 1)
          test -n "$APP_MARKETING_URL" || (echo "Missing APP_MARKETING_URL" && exit 1)
          test -n "$APP_PRIVACY_URL" || (echo "Missing APP_PRIVACY_URL" && exit 1)

      - name: Check Fastlane
        run: |
          bundle exec fastlane --version

      - name: Upload metadata and screenshots
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.upload_metadata }}
        run: |
          bundle exec fastlane ios upload_metadata

      - name: Build signed App Store IPA
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.upload_build }}
        run: |
          bundle exec fastlane ios build_appstore

      - name: Upload IPA to App Store Connect
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.upload_build }}
        run: |
          bundle exec fastlane ios upload_build

      - name: Submit for App Review
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.submit_for_review) || startsWith(github.ref, 'refs/tags/appstore-submit-') }}
        run: |
          bundle exec fastlane ios submit_review

      - name: Upload IPA artifact
        if: ${{ always() && (github.event_name != 'workflow_dispatch' || inputs.upload_build) }}
        uses: actions/upload-artifact@v4
        with:
          name: FleetScanAI-ipa
          path: build/FleetScanAI.ipa
          if-no-files-found: ignore
